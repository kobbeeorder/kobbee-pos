<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobbee POS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2b1608;
    --surface: #3a1f0a;
    --card: #472812;
    --accent: #ffffff;
    --accent2: #e8ddd4;
    --text: #f5ede4;
    --muted: #a08878;
    --green: #3d7a52;
    --red: #b03030;
    --border: #5a3520;
    --highlight: #5a3520;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .cart-btn {
    background: var(--accent);
    color: #2b1608;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--accent2); }

  .badge {
    background: #2b1608;
    color: #ffffff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .layout {
    display: flex;
    min-height: calc(100vh - 60px);
  }

  /* Category sidebar */
  .sidebar {
    width: 130px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .cat-btn {
    width: 100%;
    padding: 14px 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: all 0.2s;
    text-align: center;
    line-height: 1.4;
  }
  .cat-btn:hover { background: var(--highlight); color: var(--accent2); }
  .cat-btn.active { background: var(--highlight); color: var(--accent); border-left: 3px solid var(--accent); }

  /* Menu grid */
  .menu-area {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #8b5e3c;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }

  .menu-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    position: relative;
  }
  .menu-card:hover { border-color: var(--accent); background: var(--highlight); transform: translateY(-1px); }
  .menu-card:active { transform: scale(0.97); }

  .menu-name { font-weight: 700; font-size: 14px; line-height: 1.3; margin-bottom: 2px; }
  .menu-name-en { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .menu-price { font-size: 13px; color: var(--accent2); }
  .menu-note { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.3; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .modal .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .option-group { margin-bottom: 16px; }
  .option-label { font-weight: 700; font-size: 13px; color: var(--accent2); margin-bottom: 8px; }

  .option-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .opt-btn {
    padding: 7px 14px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt-btn:hover { border-color: var(--accent); }
  .opt-btn.selected { background: var(--accent); color: #2b1608; border-color: var(--accent); font-weight: 700; }
  .opt-btn.disabled { opacity: 0.35; cursor: not-allowed; }

  .addon-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .addon-name { font-size: 14px; }
  .addon-price { font-size: 12px; color: var(--muted); }
  .addon-toggle {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .addon-toggle.on { background: var(--green); border-color: var(--green); }

  .modal-total { font-size: 20px; font-weight: 700; color: var(--accent); margin: 16px 0; }

  .modal-actions { display: flex; gap: 10px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    font-family: 'Sarabun', sans-serif; font-size: 15px;
    cursor: pointer;
  }
  .btn-add {
    flex: 2; padding: 12px;
    background: var(--accent); border: none;
    color: #2b1608; border-radius: 8px;
    font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add:hover { background: var(--accent2); }

  /* Cart modal */
  .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 700; font-size: 14px; }
  .cart-item-detail { font-size: 12px; color: var(--muted); }
  .cart-item-price { font-weight: 700; color: var(--accent2); white-space: nowrap; }
  .cart-item-remove {
    background: var(--red); border: none; color: #fff;
    width: 26px; height: 26px; border-radius: 5px;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  .cart-summary {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .cart-total { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }

  .payment-row {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .pay-btn {
    flex: 1; padding: 12px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .pay-btn:hover { border-color: var(--accent); }
  .pay-btn.selected { border-color: var(--accent); background: var(--highlight); color: var(--accent); }

  .btn-confirm {
    width: 100%; padding: 14px;
    background: var(--green); border: none;
    color: #fff; border-radius: 8px;
    font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-confirm:hover { background: #3d6b4a; }
  .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-clear {
    width: 100%; padding: 10px; margin-top: 8px;
    background: transparent; border: 1px solid var(--red);
    color: var(--red); border-radius: 8px;
    font-family: 'Sarabun', sans-serif; font-size: 14px;
    cursor: pointer;
  }

  .sending-msg {
    text-align: center; color: var(--muted);
    padding: 10px; font-size: 14px;
  }

  .success-msg {
    text-align: center; color: #6dbf8a;
    padding: 10px; font-size: 15px; font-weight: 700;
  }

  .empty-cart { text-align: center; color: var(--muted); padding: 24px 0; }

  .section-hidden { display: none; }

  /* Config bar */
  .config-bar {
    background: #1e0f05;
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .config-bar input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    flex: 1;
    min-width: 200px;
  }
  .config-bar input:focus { outline: 1px solid var(--accent); }
  .config-bar label { color: var(--muted); white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="logo">☕ kobbee</div>
  <button class="cart-btn" onclick="openCart()">
    🧾 รายการ <span class="badge" id="cart-count">0</span>
  </button>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <button class="cat-btn active" onclick="showSection('coffee',this)">☕<br>Coffee</button>
    <button class="cat-btn" onclick="showSection('noncoffee',this)">🍵<br>Non-Coffee</button>
    <button class="cat-btn" onclick="showSection('christmas',this)">🎄<br>Christmas</button>
    <button class="cat-btn" onclick="showSection('summer',this)">🌞<br>Summer</button>
  </div>

  <!-- Menu area -->
  <div class="menu-area">

    <!-- COFFEE -->
    <div id="sec-coffee">
      <div class="section-title">☕ Coffee</div>
      <div class="menu-grid" id="grid-coffee"></div>
    </div>

    <!-- NON-COFFEE -->
    <div id="sec-noncoffee" class="section-hidden">
      <div class="section-title">🍵 Non-Coffee</div>
      <div class="menu-grid" id="grid-noncoffee"></div>
    </div>

    <!-- CHRISTMAS -->
    <div id="sec-christmas" class="section-hidden">
      <div class="section-title">🎄 เมนูคริสต์มาส</div>
      <div class="menu-grid" id="grid-christmas"></div>
    </div>

    <!-- SUMMER -->
    <div id="sec-summer" class="section-hidden">
      <div class="section-title">🌞 เมนูซัมเมอร์</div>
      <div class="menu-grid" id="grid-summer"></div>
    </div>

  </div>
</div>

<!-- Config bar -->
<div class="config-bar">
  <label>🔗 Google Apps Script URL:</label>
  <input type="text" id="sheet-url" value="https://script.google.com/macros/s/AKfycbz9b1SrWQG3HoDndh_sN3l_eD11HqHPBC89U19uZzGumkhKBR17oWcPbLYpcK3IefT3/exec" placeholder="วาง URL จาก Google Apps Script ที่นี่" />
</div>

<!-- Item Option Modal -->
<div class="modal-overlay" id="item-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-name">ชื่อเมนู</h2>
    <div class="modal-sub" id="modal-name-en"></div>

    <div class="option-group" id="group-temp">
      <div class="option-label">🌡️ ร้อน / เย็น</div>
      <div class="option-row" id="opt-temp"></div>
    </div>

    <div class="option-group" id="group-roast">
      <div class="option-label">🫘 ระดับการคั่ว</div>
      <div class="option-row" id="opt-roast"></div>
    </div>

    <div class="option-group" id="group-sweet">
      <div class="option-label">🍯 ความหวาน</div>
      <div class="option-row" id="opt-sweet"></div>
    </div>

    <div class="option-group">
      <div class="option-label">➕ Add-On</div>
      <div id="addons-list"></div>
    </div>

    <div class="modal-total">รวม: <span id="modal-total">0</span> บาท</div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-add" onclick="addToCart()">+ เพิ่มลงรายการ</button>
    </div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cart-modal" onclick="if(event.target===this)closeCart()">
  <div class="modal">
    <h2 style="margin-bottom:12px">🧾 รายการสั่ง</h2>
    <div id="cart-list"></div>
    <div class="cart-summary">
      <div class="cart-total">รวมทั้งหมด: <span id="cart-total-price">0</span> บาท</div>
      <div class="option-label" style="margin-bottom:8px">💳 วิธีชำระเงิน</div>
      <div class="payment-row">
        <button class="pay-btn" id="pay-cash" onclick="selectPay('cash')">💵 เงินสด</button>
        <button class="pay-btn" id="pay-promptpay" onclick="selectPay('promptpay')">📱 พร้อมเพย์</button>
      </div>
      <div id="status-msg"></div>
      <button class="btn-confirm" id="confirm-btn" onclick="confirmOrder()" disabled>✅ ยืนยันออเดอร์</button>
      <button class="btn-clear" onclick="clearCart()">🗑️ ล้างรายการทั้งหมด</button>
      <button class="btn-cancel" style="margin-top:8px;width:100%" onclick="closeCart()">ปิด</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const ADDONS = [
  { id:'shot',   name:'เพิ่มช็อตกาแฟ', price:15 },
  { id:'whip',   name:'วิปครีม',       price:20 },
  { id:'oat',    name:'นมโอ๊ต',         price:20 },
  { id:'honey',  name:'น้ำผึ้ง',        price:5  },
];

const SWEETS = [0, 50, 100];

// noSweet = ไม่สามารถเลือกความหวานได้ (ล็อคอัตโนมัติ)
// roastOnly = ['dark'] หมายถึงเลือกได้แค่คั่วเข้ม

const coffeeMenus = [
  { name:'อเมริกาโน่', en:'Americano', hot:55, cold:60, roast:true },
  { name:'อเมริกาโน่ส้มสด', en:'Americano Orange', cold:70, noSweet:true, noHot:true, roast:true },
  { name:'ค๊อบบี้บานอฟฟี่', en:'Kobbee Banoffee', cold:70, noHot:true, roast:true, roastOnly:'dark', note:'เลือกได้แค่คั่วเข้ม' },
  { name:'อเมริกาโน่ไลม์', en:'Americano Lime', cold:65, noSweet:true, noHot:true, roast:true },
  { name:'อเมริกาโน่น้ำผึ้ง', en:'Americano Honey', cold:65, noHot:true, roast:true },
  { name:'อเมริกาโน่ชาไทย', en:'Americano Thai Tea', cold:65, noSweet:true, noHot:true, roast:true, note:'หวานน้อยจากชาหมัก' },
  { name:'คาปูชิโน่', en:'Cappuccino', hot:60, cold:65, roast:true },
  { name:'ลาเต้', en:'Latte', hot:60, cold:65, roast:true },
  { name:'มอคค่า', en:'Mocha', hot:65, cold:70, roast:true, note:'หากไม่หวานยังมีความหวานจากช็อกโกแลต' },
  { name:'คาราเมลมัคคิอาโต้', en:'Caramel Macchiato', hot:65, cold:70, roast:true },
  { name:'เอสเพรสโซ่', en:'Espresso', hot:60, cold:65, roast:true },
  { name:'เอสเพรสโซ่มัทฉะ', en:'Espresso Matcha', cold:70, noHot:true, roast:true },
];

const nonCoffeeMenus = [
  { name:'โกโก้เนเธอร์แลนด์', en:'Netherlands Cocoa', hot:60, cold:65 },
  { name:'โกโก้เอ็กซ์ตรีม', en:'Extreme Cocoa', hot:70, cold:75 },
  { name:'ช็อกโกแลตเลอเวอร์', en:'Chocolate Lover', hot:60, cold:65 },
  { name:'ชาเขียวออร์แกนิค', en:'Organic Green Tea', hot:60, cold:60, note:'หวานน้อยจากชาสกัด' },
  { name:'ชาไทย', en:'Thai Tea', hot:60, cold:60, note:'หวานน้อยจากชาสกัด' },
  { name:'เคลียร์มัทฉะ', en:'Clear Matcha', hot:70, cold:70 },
  { name:'มัทฉะลาเต้', en:'Matcha Latte', hot:70, cold:75 },
  { name:'มัทฉะน้ำผึ้ง', en:'Matcha Honey', cold:70, noHot:true },
  { name:'มัทฉะส้ม', en:'Matcha Orange', cold:70, noSweet:true, noHot:true, note:'หวานจากน้ำส้ม' },
  { name:'นมสดคาราเมล', en:'Caramel Fresh Milk', cold:60, noSweet:true, noHot:true, note:'หวานจากคาราเมล' },
  { name:'ชามะนาว', en:'Lemon Tea', cold:60, noSweet:true, noHot:true, note:'ผงสำเร็จรูป' },
  { name:'ชาสตรอว์เบอร์รี', en:'Strawberry Tea Soda', cold:60, noSweet:true, noHot:true, note:'ผงสำเร็จรูป + โซดา' },
  { name:'สตรอว์เบอร์รีอิตาเลียนโซดา', en:'Strawberry Italian Soda', cold:60, noSweet:true, noHot:true, note:'ผงสำเร็จรูป' },
  { name:'Ceremonial Matcha Latte', en:'Ceremonial Matcha Latte', hot:115, cold:120 },
  { name:'Ceremonial Clear Matcha', en:'Ceremonial Clear Matcha', hot:115, cold:115 },
];

const christmasMenus = [
  { name:'Oreo Latte', en:'Oreo Latte', hot:89, cold:89, roast:true },
  { name:'Santa Sparkling', en:'Santa Sparkling', cold:65, noSweet:true, noHot:true, note:'เมนูโซดา' },
  { name:'Matcha Strawberry', en:'Matcha Strawberry', hot:85, cold:85, noSweet:true },
  { name:'Toffee Nut Latte', en:'Toffee Nut Latte', hot:79, cold:79, roast:true },
];

const summerMenus = [
  { name:'Banana Matcha Seasalt', en:'Banana Matcha Seasalt', cold:75, noSweet:true, noHot:true, note:'หวานจากนมกล้วย' },
  { name:'Matcha Honey Lemon', en:'Matcha Honey Lemon', hot:75, cold:75 },
  { name:'Americano Honey Lemon Soda', en:'Americano Honey Lemon Soda', cold:65, noHot:true },
  { name:'Matcha Orange', en:'Matcha Orange', hot:75, cold:75 },
];

// ============================================================
// STATE
// ============================================================
let cart = [];
let currentItem = null;
let selTemp = null;
let selRoast = null;
let selSweet = null;
let selAddons = {};
let payMethod = null;

// ============================================================
// BUILD CARDS
// ============================================================
function buildPriceStr(m) {
  let parts = [];
  if (m.hot) parts.push(`ร้อน ${m.hot}`);
  if (m.cold) parts.push(`เย็น ${m.cold}`);
  return parts.join(' / ') + ' ฿';
}

function buildCard(m) {
  const card = document.createElement('div');
  card.className = 'menu-card';
  card.innerHTML = `
    <div class="menu-name">${m.name}</div>
    <div class="menu-name-en">${m.en || ''}</div>
    <div class="menu-price">${buildPriceStr(m)}</div>
    ${m.note ? `<div class="menu-note">⚠️ ${m.note}</div>` : ''}
  `;
  card.onclick = () => openItemModal(m);
  return card;
}

function renderMenus() {
  const grids = {
    'grid-coffee': coffeeMenus,
    'grid-noncoffee': nonCoffeeMenus,
    'grid-christmas': christmasMenus,
    'grid-summer': summerMenus,
  };
  for (const [id, menus] of Object.entries(grids)) {
    const el = document.getElementById(id);
    menus.forEach(m => el.appendChild(buildCard(m)));
  }
}

// ============================================================
// SECTION SWITCH
// ============================================================
function showSection(name, btn) {
  ['coffee','noncoffee','christmas','summer'].forEach(s => {
    document.getElementById('sec-'+s).classList.toggle('section-hidden', s !== name);
  });
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ============================================================
// ITEM MODAL
// ============================================================
function openItemModal(m) {
  currentItem = m;
  selTemp = null; selRoast = null; selSweet = null; selAddons = {};
  ADDONS.forEach(a => selAddons[a.id] = false);

  document.getElementById('modal-name').textContent = m.name;
  document.getElementById('modal-name-en').textContent = m.en || '';

  // Temp buttons
  const tempEl = document.getElementById('opt-temp');
  const groupTemp = document.getElementById('group-temp');
  tempEl.innerHTML = '';
  if (m.hot && !m.noHot) {
    addOptBtn(tempEl, 'hot', `ร้อน ${m.hot}฿`, () => { selTemp='hot'; calcTotal(); });
  }
  if (m.cold) {
    addOptBtn(tempEl, 'cold', `เย็น ${m.cold}฿`, () => { selTemp='cold'; calcTotal(); });
  }
  // Auto-select if only one option
  if (m.noHot || !m.hot) { selTemp = 'cold'; }
  if (!m.cold) { selTemp = 'hot'; }
  groupTemp.style.display = (m.noHot && !m.hot) || !m.cold ? 'none' : '';
  highlightOpts('opt-temp');

  // Roast
  const roastEl = document.getElementById('opt-roast');
  const groupRoast = document.getElementById('group-roast');
  roastEl.innerHTML = '';
  if (m.roast) {
    if (m.roastOnly === 'dark') {
      addOptBtn(roastEl, 'dark', 'คั่วเข้ม', () => { selRoast='dark'; });
      selRoast = 'dark';
    } else {
      addOptBtn(roastEl, 'dark', 'คั่วเข้ม', () => { selRoast='dark'; });
      addOptBtn(roastEl, 'medium', 'คั่วกลาง', () => { selRoast='medium'; });
    }
    groupRoast.style.display = '';
  } else {
    groupRoast.style.display = 'none';
    selRoast = 'N/A';
  }
  highlightOpts('opt-roast');

  // Sweet
  const sweetEl = document.getElementById('opt-sweet');
  const groupSweet = document.getElementById('group-sweet');
  sweetEl.innerHTML = '';
  if (m.noSweet) {
    const msg = document.createElement('div');
    msg.style.cssText = 'font-size:13px;color:var(--muted);padding:4px 0';
    msg.textContent = '⚠️ ไม่สามารถเลือกความหวานได้ (หวานจากส่วนผสม)';
    sweetEl.appendChild(msg);
    selSweet = 'ตามสูตร';
  } else {
    SWEETS.forEach(s => {
      addOptBtn(sweetEl, String(s), `${s}%`, () => { selSweet=String(s); calcTotal(); });
    });
    selSweet = '100';
  }
  groupSweet.style.display = '';
  highlightOpts('opt-sweet');

  // Addons
  const addEl = document.getElementById('addons-list');
  addEl.innerHTML = '';
  ADDONS.forEach(a => {
    // Hide "shot" for non-coffee
    const isNonCoffee = nonCoffeeMenus.includes(m) || summerMenus.find(x=>x.name===m.name && !m.roast);
    if (a.id === 'shot' && !m.roast) return;
    const row = document.createElement('div');
    row.className = 'addon-row';
    row.innerHTML = `
      <div>
        <div class="addon-name">${a.name}</div>
        <div class="addon-price">+${a.price} บาท</div>
      </div>
      <button class="addon-toggle" id="tog-${a.id}" onclick="toggleAddon('${a.id}')">+</button>
    `;
    addEl.appendChild(row);
  });

  calcTotal();
  document.getElementById('item-modal').classList.add('show');
}

function addOptBtn(container, val, label, cb) {
  const btn = document.createElement('button');
  btn.className = 'opt-btn';
  btn.dataset.val = val;
  btn.textContent = label;
  btn.onclick = () => {
    cb();
    highlightOpts(container.id);
    calcTotal();
  };
  container.appendChild(btn);
}

function highlightOpts(containerId) {
  const map = { 'opt-temp': ()=>selTemp, 'opt-roast': ()=>selRoast, 'opt-sweet': ()=>selSweet };
  const el = document.getElementById(containerId);
  if (!el) return;
  el.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.val === map[containerId]?.());
  });
}

function toggleAddon(id) {
  selAddons[id] = !selAddons[id];
  const tog = document.getElementById('tog-'+id);
  tog.classList.toggle('on', selAddons[id]);
  tog.textContent = selAddons[id] ? '✓' : '+';
  calcTotal();
}

function calcTotal() {
  if (!currentItem) return;
  let base = 0;
  if (selTemp === 'hot') base = currentItem.hot || 0;
  else if (selTemp === 'cold') base = currentItem.cold || 0;
  else if (!currentItem.hot) base = currentItem.cold || 0;
  else if (!currentItem.cold) base = currentItem.hot || 0;

  ADDONS.forEach(a => {
    if (selAddons[a.id]) base += a.price;
  });
  document.getElementById('modal-total').textContent = base;
}

function closeModal() {
  document.getElementById('item-modal').classList.remove('show');
  currentItem = null;
}

function addToCart() {
  if (!currentItem) return;
  const m = currentItem;

  // Validation
  if ((m.hot && m.cold && !m.noHot) && !selTemp) {
    alert('กรุณาเลือก ร้อน หรือ เย็น'); return;
  }
  if (m.roast && !selRoast && m.roastOnly !== 'dark') {
    alert('กรุณาเลือกระดับการคั่ว'); return;
  }
  if (!m.noSweet && !selSweet) {
    alert('กรุณาเลือกความหวาน'); return;
  }

  const temp = selTemp === 'hot' ? 'ร้อน' : 'เย็น';
  const roastLabel = selRoast === 'dark' ? 'คั่วเข้ม' : selRoast === 'medium' ? 'คั่วกลาง' : '';
  const sweetLabel = m.noSweet ? 'หวานตามสูตร' : `หวาน ${selSweet}%`;

  let addonsList = ADDONS.filter(a => selAddons[a.id]);
  let addPrice = addonsList.reduce((s,a) => s+a.price, 0);

  let basePrice = selTemp === 'hot' ? (m.hot||0) : (m.cold||0);
  if (!m.hot) basePrice = m.cold||0;
  if (!m.cold) basePrice = m.hot||0;

  const item = {
    name: m.name,
    en: m.en,
    temp,
    roast: roastLabel,
    sweet: sweetLabel,
    addons: addonsList.map(a=>a.name),
    price: basePrice + addPrice,
  };
  cart.push(item);
  updateCartBadge();
  closeModal();
}

// ============================================================
// CART
// ============================================================
function updateCartBadge() {
  document.getElementById('cart-count').textContent = cart.length;
}

function openCart() {
  renderCart();
  document.getElementById('cart-modal').classList.add('show');
}

function closeCart() {
  document.getElementById('cart-modal').classList.remove('show');
}

function renderCart() {
  const el = document.getElementById('cart-list');
  el.innerHTML = '';
  if (cart.length === 0) {
    el.innerHTML = '<div class="empty-cart">ยังไม่มีรายการ</div>';
    document.getElementById('cart-total-price').textContent = '0';
    document.getElementById('confirm-btn').disabled = true;
    return;
  }
  let total = 0;
  cart.forEach((item, i) => {
    total += item.price;
    const detail = [item.temp, item.roast, item.sweet, ...item.addons].filter(Boolean).join(' · ');
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.innerHTML = `
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-detail">${detail}</div>
      </div>
      <div class="cart-item-price">${item.price} ฿</div>
      <button class="cart-item-remove" onclick="removeItem(${i})">✕</button>
    `;
    el.appendChild(row);
  });
  document.getElementById('cart-total-price').textContent = total;
  document.getElementById('confirm-btn').disabled = !payMethod;
}

function removeItem(i) {
  cart.splice(i, 1);
  updateCartBadge();
  renderCart();
}

function clearCart() {
  if (!confirm('ล้างรายการทั้งหมด?')) return;
  cart = []; payMethod = null;
  updateCartBadge();
  renderCart();
  ['pay-cash','pay-promptpay'].forEach(id => document.getElementById(id).classList.remove('selected'));
}

function selectPay(method) {
  payMethod = method;
  document.getElementById('pay-cash').classList.toggle('selected', method === 'cash');
  document.getElementById('pay-promptpay').classList.toggle('selected', method === 'promptpay');
  document.getElementById('confirm-btn').disabled = cart.length === 0;
}

// ============================================================
// SEND TO GOOGLE SHEETS
// ============================================================
async function confirmOrder() {
  const url = document.getElementById('sheet-url').value.trim();
  if (!url) {
    alert('⚠️ กรุณาใส่ Google Apps Script URL ที่แถบด้านล่างก่อนนะคะ\n\nดูวิธีตั้งค่าได้จากคำแนะนำที่ได้รับ');
    return;
  }
  if (cart.length === 0) return;

  const statusEl = document.getElementById('status-msg');
  statusEl.innerHTML = '<div class="sending-msg">⏳ กำลังบันทึก...</div>';
  document.getElementById('confirm-btn').disabled = true;

  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH');
  const timeStr = now.toLocaleTimeString('th-TH');
  const total = cart.reduce((s,i) => s+i.price, 0);
  const payLabel = payMethod === 'cash' ? 'เงินสด' : 'พร้อมเพย์';

  // Build rows
  const rows = cart.map(item => ({
    date: dateStr,
    time: timeStr,
    menu: item.name,
    menuEn: item.en,
    temp: item.temp,
    roast: item.roast || '-',
    sweet: item.sweet,
    addons: item.addons.join(', ') || '-',
    price: item.price,
    payment: payLabel,
    orderTotal: total,
  }));

  try {
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ rows }),
    });
    statusEl.innerHTML = '<div class="success-msg">✅ บันทึกเรียบร้อย!</div>';
    setTimeout(() => {
      cart = []; payMethod = null;
      updateCartBadge();
      closeCart();
      statusEl.innerHTML = '';
      ['pay-cash','pay-promptpay'].forEach(id => document.getElementById(id).classList.remove('selected'));
    }, 1500);
  } catch(e) {
    statusEl.innerHTML = `<div style="color:#e07070;font-size:13px;padding:8px">❌ บันทึกไม่สำเร็จ: ${e.message}</div>`;
    document.getElementById('confirm-btn').disabled = false;
  }
}

// ============================================================
// INIT
// ============================================================
renderMenus();
</script>
